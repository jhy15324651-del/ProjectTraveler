# ================================================
# ProjectTraveler - Nginx 설정 (HTTPS + Reverse Proxy)
# ================================================
# Let's Encrypt 인증서 발급 후 사용
# 도메인: yourdomain.com → 실제 도메인으로 교체 필요
# ================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 로그 설정 ────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # ── 파일 업로드 크기 제한 (500MB 허용) ───────────
    client_max_body_size 500m;

    # ── gzip 압축 ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Upstream: Spring Boot ─────────────────────────
    upstream spring-app {
        server spring-app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS 리다이렉트 ───────────────────────
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;

        # Certbot ACME challenge (Let's Encrypt 인증용)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 나머지 모든 요청은 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS 메인 서버 ───────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name yourdomain.com www.yourdomain.com;

        # ── SSL 인증서 (Let's Encrypt) ─────────────────
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

        # ── SSL 보안 설정 ──────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── 보안 헤더 ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # ── Spring Boot 프록시 ─────────────────────────
        location / {
            proxy_pass         http://spring-app;
            proxy_http_version 1.1;

            # 실제 클라이언트 IP 전달
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket 지원 (Vivox 등 실시간 통신)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # 타임아웃 설정
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Unity WebGL 정적 파일 최적화 ──────────────
        location ~* \.(wasm|data|bundle|mem)$ {
            proxy_pass http://spring-app;
            gzip off;  # WebGL 압축 파일은 재압축 불필요
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── 정적 리소스 캐싱 ──────────────────────────
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass http://spring-app;
            add_header Cache-Control "public, max-age=2592000";
        }
    }
}