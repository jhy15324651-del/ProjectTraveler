# ================================================
# ProjectTraveler - Nginx 초기 설정 (SSL 발급 전용)
# ================================================
# 최초 Let's Encrypt 인증서 발급 시 사용
# HTTPS 설정이 없는 HTTP 전용 버전
#
# 사용법:
#   1. 이 파일을 nginx.conf로 복사해서 사용
#   2. certbot으로 인증서 발급
#   3. 원래 nginx.conf로 교체 후 nginx reload
# ================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 500m;

    upstream spring-app {
        server spring-app:8080;
    }

    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 임시: HTTP로 직접 서비스 (인증서 발급 전)
        location / {
            proxy_pass         http://spring-app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}